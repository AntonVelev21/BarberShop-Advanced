name: Build and Push to ACR

on:
  push:
    branches: [ "main" ]  # Change this to "master" if your main branch is called master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_NAME }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_NAME }}/django-barbershop:latest .
          docker push ${{ secrets.ACR_NAME }}/django-barbershop:latest