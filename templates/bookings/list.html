{% extends 'common/base.html' %}

{% block content %}
<div class="container py-5 mb-5">
    {% if request.user.is_staff %}
    <div class="mb-4 border-bottom border-warning pb-3">
        <p class="text-warning text-uppercase small mb-1 ls-2">Management</p>
        <h2 class="display-6 fw-bold text-uppercase text-white mb-0">Schedule & Bookings</h2>
    </div>
    {% else %}
    <div class="mb-4 border-bottom border-warning pb-3">
        <h2 class="display-6 fw-bold text-uppercase text-white mb-0">My Bookings</h2>
    </div>
    {% endif %}

    <div class="mb-5">
        <h3 class="h4 text-warning text-uppercase fw-bold mb-4 ls-1">Upcoming</h3>
        {% include 'bookings/up_comming.html' %}
    </div>

    <div>
        <h3 class="h4 text-warning text-uppercase fw-bold mb-4 ls-1">Booking History</h3>
        {% include 'bookings/history.html' %}
    </div>
</div>
{% endblock %}
